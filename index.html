<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambtenarenlunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app">
    <!-- Office selector panel -->
    <div id="office-panel" class="panel">
      <div class="panel-header">
        <h1 class="site-title">Ambtenarenlunch</h1>
        <p class="site-tagline">Eet lekker, ook als ambtenaar.</p>
      </div>
      <p class="panel-label">Kies je kantoor</p>
      <div id="office-list"></div>
      <div class="suggest-footer">
        <button class="suggest-btn" id="suggest-btn-office">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Stel een restaurant voor
        </button>
      </div>
    </div>

    <!-- Restaurant panel (hidden by default) -->
    <div id="restaurant-panel" class="panel">
      <div class="panel-header">
        <button class="back-btn" id="back-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Alle kantoren
        </button>
        <h2 class="office-heading" id="panel-office-name"></h2>
        <p class="office-heading-address" id="panel-office-address"></p>
      </div>
      <div id="restaurant-list"></div>
      <div class="suggest-footer">
        <button class="suggest-btn" id="suggest-btn-restaurant">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Stel een restaurant voor
        </button>
      </div>
    </div>

    <!-- Suggest modal -->
    <div id="suggest-modal" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">Stel een restaurant voor</h3>
          <button class="modal-close" id="modal-close" aria-label="Sluiten">&times;</button>
        </div>
        <form id="suggest-form">
          <div class="form-group">
            <label for="suggest-office">Kantoor</label>
            <select id="suggest-office" name="kantoor" required>
              <option value="">Kies een kantoor…</option>
            </select>
          </div>
          <div class="form-group">
            <label for="suggest-name">Naam restaurant</label>
            <input type="text" id="suggest-name" name="restaurant" required placeholder="bijv. Tokoman">
          </div>
          <div class="form-group">
            <label for="suggest-address">Adres</label>
            <input type="text" id="suggest-address" name="adres" required placeholder="bijv. Waterlooplein 327">
          </div>
          <div class="form-group">
            <label for="suggest-why">Waarom aanbevelen?</label>
            <textarea id="suggest-why" name="toelichting" required rows="3" placeholder="Wat maakt dit restaurant een goede lunchtip?"></textarea>
          </div>
          <button type="submit" class="form-submit">Verstuur suggestie</button>
        </form>
        <div id="form-success" class="form-success" hidden>
          <p>Bedankt voor je tip! We nemen het mee.</p>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div id="map"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script data-goatcounter="https://meng.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
